<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Savoiré AI v2.0 — The World's Most Refined AI Study Companion. Generate notes, flashcards, quizzes, summaries and mind maps with live streaming AI. Free forever.">
  <meta name="theme-color" content="#020202">
  <meta name="color-scheme" content="dark">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Savoiré AI v2.0 — AI Study Operating System">
  <meta property="og:description" content="Cinematic AI workspace. Live streaming. Premium study tools. Free forever.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://savoireai.vercel.app/dashboard">
  
  <title>Savoiré AI v2.0 — Cinematic AI Workspace</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
  
  <!-- Master Styles -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       DASHBOARD-SPECIFIC CINEMATIC LAYOUT
       ═══════════════════════════════════════════════════════════════════════ */
    
    /* ── GLOBAL LAYOUT OVERRIDES ────────────────────────────────────────── */
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--void);
    }
    
    /* ── MAIN APP CONTAINER ─────────────────────────────────────────────── */
    .app-container {
      display: flex;
      height: 100vh;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    
    /* ═══════════════════════════════════════════════════════════════════════
       CINEMATIC SIDEBAR (LEFT PANEL)
       ═══════════════════════════════════════════════════════════════════════ */
    .sidebar {
      width: 320px;
      background: rgba(12, 14, 18, 0.75);
      backdrop-filter: blur(24px);
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      transition: all var(--transition-cinema);
      z-index: 20;
      flex-shrink: 0;
    }
    
    .sidebar.collapsed {
      width: 0;
      opacity: 0;
      overflow: hidden;
      border-right: none;
    }
    
    /* Sidebar Header */
    .sidebar-header {
      padding: 28px 24px;
      border-bottom: 1px solid var(--glass-border);
    }
    
    .workspace-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      background: var(--grad-aurora);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 4px;
    }
    
    .workspace-sub {
      font-size: 0.7rem;
      font-family: var(--font-mono);
      color: var(--silver);
      opacity: 0.6;
      letter-spacing: 0.02em;
    }
    
    /* Tool Selector */
    .tool-selector {
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .tool-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      background: transparent;
      border: none;
      border-radius: var(--radius-lg);
      color: var(--silver);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-align: left;
      width: 100%;
    }
    
    .tool-btn i {
      width: 24px;
      font-size: 1.1rem;
      transition: transform var(--transition-fast);
    }
    
    .tool-btn:hover {
      background: var(--purple-dim);
      color: var(--pearl);
      transform: translateX(4px);
    }
    
    .tool-btn.active {
      background: var(--purple-dim);
      color: var(--purple);
      border-left: 2px solid var(--purple);
    }
    
    .tool-btn.active i {
      color: var(--purple);
    }
    
    /* Input Area */
    .input-area {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    
    .premium-textarea {
      width: 100%;
      background: var(--charcoal);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 16px;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--pearl);
      resize: none;
      transition: all var(--transition-fast);
    }
    
    .premium-textarea:focus {
      border-color: var(--purple);
      outline: none;
      box-shadow: 0 0 0 3px var(--purple-dim);
    }
    
    /* Generate Button */
    .generate-btn {
      width: 100%;
      padding: 14px;
      background: var(--grad-aurora);
      border: none;
      border-radius: var(--radius-full);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all var(--transition-spring);
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.4);
    }
    
    /* ═══════════════════════════════════════════════════════════════════════
       MAIN WORKSPACE (RIGHT PANEL)
       ═══════════════════════════════════════════════════════════════════════ */
    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: radial-gradient(ellipse at 20% 30%, rgba(139,92,246,0.03), transparent 70%);
    }
    
    /* Cinematic Navbar */
    .cinematic-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      background: transparent;
      border-bottom: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      z-index: 10;
    }
    
    .nav-greeting {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 400;
      color: var(--silver);
    }
    
    .nav-actions {
      display: flex;
      gap: 12px;
    }
    
    .nav-btn {
      background: transparent;
      border: none;
      color: var(--silver);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 8px;
      border-radius: var(--radius-full);
      transition: all var(--transition-fast);
    }
    
    .nav-btn:hover {
      background: var(--purple-dim);
      color: var(--purple);
    }
    
    /* Output Container */
    .output-container {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      scroll-behavior: smooth;
    }
    
    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      color: var(--silver);
      opacity: 0.7;
    }
    
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      background: var(--grad-aurora);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    /* Streaming Overlay */
    .streaming-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--void);
      backdrop-filter: blur(16px);
      z-index: 30;
      display: flex;
      flex-direction: column;
      padding: 40px;
      animation: fadeIn 0.4s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; backdrop-filter: blur(0); }
      to { opacity: 1; backdrop-filter: blur(16px); }
    }
    
    .streaming-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 24px;
    }
    
    .streaming-content {
      flex: 1;
      overflow-y: auto;
      font-family: var(--font-body);
      line-height: 1.7;
      white-space: pre-wrap;
    }
    
    .streaming-cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: var(--purple);
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }
    
    /* Result Cards */
    .result-card {
      background: var(--graphite);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 28px;
      margin-bottom: 24px;
      transition: all var(--transition-base);
    }
    
    .result-card:hover {
      border-color: var(--purple-dim);
      box-shadow: var(--shadow-glow);
    }
    
    .result-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    /* Flashcard */
    .flashcard {
      background: var(--charcoal);
      border-radius: var(--radius-xl);
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-spring);
      transform-style: preserve-3d;
    }
    
    /* Quiz Options */
    .quiz-option {
      background: var(--charcoal);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 14px 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .quiz-option:hover {
      border-color: var(--purple);
      background: var(--purple-dim);
    }
    
    .quiz-option.correct {
      border-color: var(--emerald);
      background: rgba(16, 185, 129, 0.1);
    }
    
    .quiz-option.incorrect {
      border-color: var(--ruby);
      background: rgba(239, 68, 68, 0.1);
    }
    
    /* Mind Map */
    .mindmap-node {
      padding: 8px 16px;
      background: var(--charcoal);
      border-radius: var(--radius-lg);
      border-left: 3px solid var(--purple);
      margin-bottom: 8px;
    }
    
    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 12px;
      padding: 16px 28px;
      border-top: 1px solid var(--glass-border);
      background: rgba(12, 14, 18, 0.5);
    }
    
    .toolbar-btn {
      background: transparent;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-full);
      padding: 8px 16px;
      color: var(--silver);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .toolbar-btn:hover {
      border-color: var(--purple);
      color: var(--purple);
      transform: translateY(-1px);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -320px;
        z-index: 100;
        height: 100%;
        transition: left var(--transition-cinema);
      }
      
      .sidebar.mobile-open {
        left: 0;
      }
      
      .workspace {
        width: 100%;
      }
      
      .output-container {
        padding: 20px;
      }
      
      .toolbar {
        padding: 12px 16px;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>

<div class="app-container">
  
  <!-- ═══════════════════════════════════════════════════════════════════════
       CINEMATIC SIDEBAR
       ═══════════════════════════════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="workspace-title">Savoiré AI</div>
      <div class="workspace-sub">Cinematic Workspace · v2.0</div>
    </div>
    
    <div class="tool-selector" id="toolSelector">
      <button class="tool-btn active" data-tool="notes">
        <i class="fas fa-book-open"></i>
        <span>Study Notes</span>
      </button>
      <button class="tool-btn" data-tool="flashcards">
        <i class="fas fa-layer-group"></i>
        <span>Flashcards</span>
      </button>
      <button class="tool-btn" data-tool="quiz">
        <i class="fas fa-question-circle"></i>
        <span>Practice Quiz</span>
      </button>
      <button class="tool-btn" data-tool="summary">
        <i class="fas fa-align-left"></i>
        <span>Smart Summary</span>
      </button>
      <button class="tool-btn" data-tool="mindmap">
        <i class="fas fa-project-diagram"></i>
        <span>Mind Map</span>
      </button>
    </div>
    
    <div class="input-area">
      <textarea 
        id="mainInput" 
        class="premium-textarea" 
        rows="5" 
        placeholder="Enter any topic, concept, question, or paste text to study...&#10;&#10;Examples:&#10;• Quantum Entanglement&#10;• The French Revolution&#10;• Machine Learning algorithms&#10;• Photosynthesis process"
      ></textarea>
      
      <button class="generate-btn" id="generateBtn">
        <i class="fas fa-sparkle"></i>
        <span id="generateLabel">Generate Study Materials</span>
      </button>
      
      <button class="generate-btn" id="cancelBtn" style="display: none; background: var(--charcoal); margin-top: 8px;">
        <i class="fas fa-stop-circle"></i>
        <span>Cancel Generation</span>
      </button>
    </div>
  </aside>
  
  <!-- ═══════════════════════════════════════════════════════════════════════
       MAIN WORKSPACE
       ═══════════════════════════════════════════════════════════════════════ -->
  <main class="workspace">
    
    <!-- Cinematic Navbar -->
    <nav class="cinematic-nav">
      <div class="nav-greeting" id="greetingText">
        <i class="fas fa-sparkle" style="color: var(--purple); margin-right: 8px;"></i>
        Think Less. Know More.
      </div>
      <div class="nav-actions">
        <button class="nav-btn" id="themeToggle" title="Toggle Theme">
          <i class="fas fa-moon"></i>
        </button>
        <button class="nav-btn" id="sidebarToggle" title="Toggle Sidebar">
          <i class="fas fa-bars"></i>
        </button>
        <button class="nav-btn" id="focusToggle" title="Focus Mode">
          <i class="fas fa-expand-alt"></i>
        </button>
      </div>
    </nav>
    
    <!-- Output Container -->
    <div class="output-container" id="outputContainer">
      
      <!-- Empty State -->
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">
          <i class="fas fa-brain"></i>
        </div>
        <h2 style="font-family: var(--font-display); margin-bottom: 12px;">What would you like to study?</h2>
        <p style="max-width: 400px; margin: 0 auto;">Enter any topic in the sidebar, select your tool, and watch Savoiré AI generate premium study materials in real-time.</p>
      </div>
      
      <!-- Result Area -->
      <div id="resultArea" style="display: none;"></div>
      
    </div>
    
    <!-- Toolbar -->
    <div class="toolbar" id="toolbar" style="display: none;">
      <button class="toolbar-btn" id="copyBtn"><i class="fas fa-copy"></i> Copy</button>
      <button class="toolbar-btn" id="pdfBtn"><i class="fas fa-file-pdf"></i> PDF</button>
      <button class="toolbar-btn" id="saveBtn"><i class="fas fa-star"></i> Save</button>
      <button class="toolbar-btn" id="shareBtn"><i class="fas fa-share-alt"></i> Share</button>
      <button class="toolbar-btn" id="clearBtn"><i class="fas fa-trash"></i> Clear</button>
    </div>
    
  </main>
  
  <!-- Streaming Overlay -->
  <div class="streaming-overlay" id="streamingOverlay" style="display: none;">
    <div class="streaming-header">
      <i class="fas fa-spinner fa-pulse" style="font-size: 1.5rem; color: var(--purple);"></i>
      <div>
        <div style="font-weight: 600; margin-bottom: 4px;">Savoiré AI is thinking</div>
        <div style="font-size: 0.8rem; opacity: 0.7;" id="streamingStatus">Analysing your topic...</div>
      </div>
    </div>
    <div class="streaming-content" id="streamingContent">
      <span id="streamingText"></span>
      <span class="streaming-cursor"></span>
    </div>
  </div>
  
</div>

<!-- Ambiant Aurora Background -->
<div class="aurora-ambient" style="position: fixed; inset: 0; pointer-events: none; z-index: -1;">
  <div class="aurora-orb"></div>
  <div class="aurora-orb" style="animation-delay: -5s;"></div>
  <div class="aurora-orb" style="animation-delay: -10s;"></div>
</div>

<script>
  // ─────────────────────────────────────────────────────────────────────────
  // DASHBOARD CONTROLLER — Cinema-Grade UX
  // ─────────────────────────────────────────────────────────────────────────
  
  (function() {
    // DOM Elements
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const themeToggle = document.getElementById('themeToggle');
    const focusToggle = document.getElementById('focusToggle');
    const generateBtn = document.getElementById('generateBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const mainInput = document.getElementById('mainInput');
    const resultArea = document.getElementById('resultArea');
    const emptyState = document.getElementById('emptyState');
    const toolbar = document.getElementById('toolbar');
    const streamingOverlay = document.getElementById('streamingOverlay');
    const streamingText = document.getElementById('streamingText');
    const streamingStatus = document.getElementById('streamingStatus');
    const generateLabel = document.getElementById('generateLabel');
    const greetingText = document.getElementById('greetingText');
    
    // State
    let currentTool = 'notes';
    let isGenerating = false;
    let abortController = null;
    let currentData = null;
    let streamBuffer = '';
    
    // Tool buttons
    const toolBtns = document.querySelectorAll('.tool-btn');
    
    // Update active tool
    function setActiveTool(tool) {
      currentTool = tool;
      toolBtns.forEach(btn => {
        const isActive = btn.dataset.tool === tool;
        btn.classList.toggle('active', isActive);
      });
      
      // Update generate button text
      const toolNames = {
        notes: 'Generate Study Notes',
        flashcards: 'Create Flashcards',
        quiz: 'Build Quiz',
        summary: 'Generate Summary',
        mindmap: 'Create Mind Map'
      };
      generateLabel.textContent = toolNames[tool] || 'Generate Study Materials';
    }
    
    toolBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        setActiveTool(btn.dataset.tool);
      });
    });
    
    // Sidebar toggle
    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });
    
    // Theme toggle
    let isDark = true;
    themeToggle.addEventListener('click', () => {
      isDark = !isDark;
      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
      themeToggle.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
      
      // Update CSS variables for light mode
      if (!isDark) {
        document.documentElement.style.setProperty('--void', '#F8FAFC');
        document.documentElement.style.setProperty('--charcoal', '#FFFFFF');
        document.documentElement.style.setProperty('--graphite', '#F1F5F9');
        document.documentElement.style.setProperty('--pearl', '#020202');
        document.documentElement.style.setProperty('--silver', '#334155');
      } else {
        document.documentElement.style.setProperty('--void', '#060608');
        document.documentElement.style.setProperty('--charcoal', '#0F1115');
        document.documentElement.style.setProperty('--graphite', '#15171C');
        document.documentElement.style.setProperty('--pearl', '#F8FAFC');
        document.documentElement.style.setProperty('--silver', '#D4D8DE');
      }
    });
    
    // Focus mode
    let isFocusMode = false;
    focusToggle.addEventListener('click', () => {
      isFocusMode = !isFocusMode;
      if (isFocusMode) {
        sidebar.classList.add('collapsed');
        focusToggle.innerHTML = '<i class="fas fa-compress-alt"></i>';
      } else {
        sidebar.classList.remove('collapsed');
        focusToggle.innerHTML = '<i class="fas fa-expand-alt"></i>';
      }
    });
    
    // Update greeting based on time
    function updateGreeting() {
      const hour = new Date().getHours();
      let greeting = '';
      if (hour < 12) greeting = 'Good morning';
      else if (hour < 18) greeting = 'Good afternoon';
      else greeting = 'Good evening';
      greetingText.innerHTML = `<i class="fas fa-sparkle" style="color: var(--purple); margin-right: 8px;"></i>${greeting}. Think Less. Know More.`;
    }
    updateGreeting();
    
    // Cancel generation
    cancelBtn.addEventListener('click', () => {
      if (abortController) {
        abortController.abort();
        abortController = null;
      }
      isGenerating = false;
      streamingOverlay.style.display = 'none';
      generateBtn.style.display = 'flex';
      cancelBtn.style.display = 'none';
    });
    
    // Show streaming UI
    function showStreaming() {
      streamingOverlay.style.display = 'flex';
      streamingText.innerHTML = '';
      streamBuffer = '';
      generateBtn.style.display = 'none';
      cancelBtn.style.display = 'flex';
      resultArea.style.display = 'none';
      emptyState.style.display = 'none';
      toolbar.style.display = 'none';
    }
    
    // Hide streaming and show result
    function hideStreaming() {
      streamingOverlay.style.display = 'none';
      generateBtn.style.display = 'flex';
      cancelBtn.style.display = 'none';
      resultArea.style.display = 'block';
      toolbar.style.display = 'flex';
    }
    
    // Render markdown to HTML
    function renderMarkdown(text) {
      if (!text) return '';
      if (window.marked) {
        try {
          return DOMPurify.sanitize(marked.parse(text));
        } catch(e) {}
      }
      // Simple fallback
      return text.replace(/\n/g, '<br>');
    }
    
    // Append streaming token
    function appendStreamToken(token) {
      streamBuffer += token;
      streamingText.innerHTML = renderMarkdown(streamBuffer);
      const container = document.getElementById('streamingContent');
      if (container) container.scrollTop = container.scrollHeight;
    }
    
    // Generate with SSE streaming
    async function generateWithStream(topic, tool) {
      showStreaming();
      isGenerating = true;
      abortController = new AbortController();
      
      const depth = 'detailed';
      const language = 'English';
      const style = 'simple';
      
      try {
        const response = await fetch('/api/study', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: topic,
            options: { depth, language, style, tool, stream: true }
          }),
          signal: abortController.signal
        });
        
        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }
        
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          
          for (const line of lines) {
            if (line.startsWith('event: ')) continue;
            if (!line.startsWith('data: ')) continue;
            
            const dataStr = line.slice(6).trim();
            if (dataStr === '[DONE]') continue;
            
            try {
              const data = JSON.parse(dataStr);
              
              if (data.t !== undefined) {
                appendStreamToken(data.t);
              } else if (data.topic !== undefined || data.ultra_long_notes !== undefined) {
                // Final data
                currentData = data;
                renderResult(data);
                hideStreaming();
                isGenerating = false;
                abortController = null;
                return;
              }
            } catch(e) {}
          }
        }
        
        // If we get here without final data, something went wrong
        if (!currentData) {
          throw new Error('Incomplete stream response');
        }
        
      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error('Stream error:', err);
          showError(err.message);
        }
        hideStreaming();
        isGenerating = false;
        abortController = null;
      }
    }
    
    // Render final result
    function renderResult(data) {
      const topic = data.topic || 'Study Material';
      const notes = data.ultra_long_notes || '';
      const concepts = data.key_concepts || [];
      const tricks = data.key_tricks || [];
      const questions = data.practice_questions || [];
      const applications = data.real_world_applications || [];
      const misconceptions = data.common_misconceptions || [];
      
      let html = `
        <div class="result-card">
          <div class="result-title">
            <i class="fas fa-graduation-cap" style="color: var(--purple);"></i>
            ${escapeHtml(topic)}
          </div>
          <div class="md-content">${renderMarkdown(notes)}</div>
        </div>
      `;
      
      if (concepts.length > 0) {
        html += `
          <div class="result-card">
            <div class="result-title">
              <i class="fas fa-lightbulb" style="color: var(--cyan);"></i>
              Key Concepts
            </div>
            <ul>
              ${concepts.map(c => `<li>${escapeHtml(c)}</li>`).join('')}
            </ul>
          </div>
        `;
      }
      
      if (tricks.length > 0) {
        html += `
          <div class="result-card">
            <div class="result-title">
              <i class="fas fa-magic" style="color: var(--gold);"></i>
              Study Tricks
            </div>
            <ul>
              ${tricks.map(t => `<li>${escapeHtml(t)}</li>`).join('')}
            </ul>
          </div>
        `;
      }
      
      if (questions.length > 0) {
        html += `
          <div class="result-card">
            <div class="result-title">
              <i class="fas fa-question-circle" style="color: var(--emerald);"></i>
              Practice Questions
            </div>
            ${questions.map((q, i) => `
              <div style="margin-bottom: 24px;">
                <div style="font-weight: 600; margin-bottom: 8px;">Q${i+1}: ${escapeHtml(q.question)}</div>
                <div class="quiz-option" style="margin-left: 16px;">
                  <i class="fas fa-check-circle" style="color: var(--emerald); margin-right: 8px;"></i>
                  ${escapeHtml(q.answer)}
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }
      
      if (applications.length > 0) {
        html += `
          <div class="result-card">
            <div class="result-title">
              <i class="fas fa-globe" style="color: var(--blue);"></i>
              Real-World Applications
            </div>
            <ul>
              ${applications.map(a => `<li>${escapeHtml(a)}</li>`).join('')}
            </ul>
          </div>
        `;
      }
      
      if (misconceptions.length > 0) {
        html += `
          <div class="result-card">
            <div class="result-title">
              <i class="fas fa-exclamation-triangle" style="color: var(--ruby);"></i>
              Common Misconceptions
            </div>
            <ul>
              ${misconceptions.map(m => `<li>${escapeHtml(m)}</li>`).join('')}
            </ul>
          </div>
        `;
      }
      
      resultArea.innerHTML = html;
      emptyState.style.display = 'none';
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    function showError(msg) {
      resultArea.innerHTML = `
        <div class="result-card" style="border-color: var(--ruby);">
          <div class="result-title">
            <i class="fas fa-exclamation-circle" style="color: var(--ruby);"></i>
            Generation Error
          </div>
          <p>${escapeHtml(msg)}</p>
          <p style="margin-top: 16px; font-size: 0.8rem; opacity: 0.7;">Please try again in a moment.</p>
        </div>
      `;
      resultArea.style.display = 'block';
      emptyState.style.display = 'none';
      toolbar.style.display = 'flex';
    }
    
    // Generate handler
    generateBtn.addEventListener('click', async () => {
      const topic = mainInput.value.trim();
      if (!topic) {
        mainInput.placeholder = 'Please enter a topic to study...';
        mainInput.style.borderColor = 'var(--ruby)';
        setTimeout(() => { mainInput.style.borderColor = ''; }, 2000);
        return;
      }
      
      await generateWithStream(topic, currentTool);
    });
    
    // Copy result
    document.getElementById('copyBtn')?.addEventListener('click', () => {
      if (currentData && currentData.ultra_long_notes) {
        navigator.clipboard.writeText(currentData.ultra_long_notes);
        showToast('Copied to clipboard!', 'success');
      }
    });
    
    // Save note
    document.getElementById('saveBtn')?.addEventListener('click', () => {
      if (currentData) {
        const saved = JSON.parse(localStorage.getItem('sv_saved') || '[]');
        saved.unshift({
          id: Date.now(),
          topic: currentData.topic,
          tool: currentTool,
          data: currentData,
          savedAt: Date.now()
        });
        localStorage.setItem('sv_saved', JSON.stringify(saved.slice(0, 50)));
        showToast('Saved to your library!', 'success');
      }
    });
    
    // Clear
    document.getElementById('clearBtn')?.addEventListener('click', () => {
      resultArea.innerHTML = '';
      resultArea.style.display = 'none';
      emptyState.style.display = 'flex';
      toolbar.style.display = 'none';
      currentData = null;
    });
    
    // Share
    document.getElementById('shareBtn')?.addEventListener('click', () => {
      if (currentData && navigator.share) {
        navigator.share({
          title: `Study Notes: ${currentData.topic}`,
          text: `Generated by Savoiré AI - ${currentData.topic}`,
          url: window.location.href
        }).catch(() => {});
      }
    });
    
    // PDF placeholder
    document.getElementById('pdfBtn')?.addEventListener('click', () => {
      showToast('PDF export ready — premium layout coming soon', 'info');
    });
    
    // Toast notification
    function showToast(msg, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}"></i><span>${msg}</span>`;
      toast.style.position = 'fixed';
      toast.style.bottom = '20px';
      toast.style.right = '20px';
      toast.style.zIndex = '10000';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }
    
    // Initial state
    setActiveTool('notes');
    
  })();
</script>

</body>
</html>
